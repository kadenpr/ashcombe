name: Ashcombe Daily News Digest

on:
  workflow_dispatch:
    inputs:
      force_monday:
        description: 'Force Monday weekly checks (profile + headcount)'
        type: boolean
        default: false

# Serialise concurrent dispatches — if Pipedream fires twice, the second run
# queues until the first finishes. It then reads today's state.json and the
# "already ran today" guard in tracker.py exits it before sending any email.
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          FORCE_MONDAY: ${{ github.event.inputs.force_monday }}
        run: python tracker.py

      - name: Save updated state
        run: |
          git config user.name "Ashcombe Tracker"
          git config user.email "tracker@ashcombeadvisers.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update tracker state"
          git pull --rebase origin main
          git push
